press:
  bio: >-
    Magnus Lodefalk is an associate professor of economics at Örebro University and the Ratio
    Institute, and a fellow of the Global Labor Organization. He initiated and co-directs the
    AI-Econ Lab and co-leads AISCAF, the WASP-HS research cluster on AI, structural change and
    the future of work. His research uses large linked employer–employee data to study how
    artificial intelligence, trade and migration shape jobs, wages and the growth of firms.
