lede: >-
  I study what drives and hinders the growth of firms, and the effects on jobs, wages and economic
  growth: technology and artificial intelligence, public policy and trade, migration, and the
  servicification of firms.

bio:
  - "I am an associate professor at Örebro University, Sweden, and affiliated with the Ratio research institute and the Global Labor Organization. I am the initiator of and co-lead the AI-Econ Lab at Örebro University, and I co-lead the Swedish research cluster on AI, Structural Change and the Future of Work (AISCAF), financed by WASP-HS. I also co-lead a research group at Örebro University (EFGI) and coordinate the economics seminar and brown-bag series."
  - "My research is about what drives and hinders the growth of companies and the effects of such factors on jobs, wages and economic growth. When you start to think of the staggering consequences for human welfare involved in questions about drivers and barriers to growth, it is hard to think of anything else (alluding to Robert Lucas, Jr.)."
  - "I study the economic impact of a range of factors, from technology such as artificial intelligence and public policy (for example on foreign trade) to the impact of migrant workers and the servicification of firms. I often employ econometric methods on large de-identified longitudinal and linked employer–employee data."

interests:
  - "Artificial intelligence, technology and work"
  - "Firm growth: drivers and barriers"
  - "Foreign trade and public policy"
  - "Migration and the labour market"
  - "Servicification of firms"
  - "Linked employer–employee microdata"

